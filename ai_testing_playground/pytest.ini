[pytest]
# Async tests run without an explicit marker on each test
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

markers =
    asyncio: mark test as asyncio to run async code

# Where tests live and what counts as a test file
testpaths = app_tests
python_files = test_*.py

# importlib import mode keeps test files with spaces/odd names importable
addopts = --import-mode=importlib

norecursedirs = .git __pycache__ .pytest_cache venv .venv node_modules

# Emit full JUnit XML so a reporting layer can classify documented exceptions
junit_logging = all
junit_log_passing_tests = true
